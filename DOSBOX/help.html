<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>東方に必要なDOSの知識</title>
  <style>
    body { font-family: sans-serif; line-height: 1.6; }
    code { background: #f4f4f4; padding: 2px 4px; border-radius: 3px; }
    pre { background: #f4f4f4; padding: 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>東方に必要なDOSの知識</h1>

  <h2>基本コマンド</h2>

  <h3>フォルダ生成</h3>
  <p>フォルダを作成するコマンド：</p>
  <pre><code>mkdir フォルダ名</code></pre>

  <h3>ファイルの削除</h3>
  <p>ファイルを削除するコマンド：</p>
  <pre><code>del ファイルのパス</code></pre>

  <h3>コピー</h3>
  <p>ファイルをコピーするコマンド：</p>
  <pre><code>copy コピー元 コピー先</code></pre>

  <h3>フォルダ構造確認</h3>
  <p>フォルダ内のファイルやフォルダを一覧表示するコマンド：</p>
  <pre><code>dir</code></pre>

  <h2>gameの展開ファイル名</h2>
  <ul>
    <li>GEN.exe</li>
    <li>KAI.exe</li>
    <li>GEN.exe</li>
  </ul>

  <h2>注意</h2>
  <p>封魔録は展開の必要はないっぽい。</p>
  <p>ある程度知識がないと使えんよ。</p>
</body>
</html>
